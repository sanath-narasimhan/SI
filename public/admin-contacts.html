<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Contact Submissions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #fbf9fd;
            color: #333;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 1000px;
        }
        h1 {
            color: #4a148c;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #555;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            box-sizing: border-box;
            max-width: 300px;
        }
        button {
            background: linear-gradient(135deg, #FFD700 0%, #FDB931 100%);
            color: #333;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f9f9f9;
            color: #555;
            font-weight: 600;
        }
        tr:hover td {
            background: #fdfbff;
        }
        .message-content {
            max-width: 300px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contact Form Submissions</h1>
        
        <form id="authForm">
            <div class="form-group">
                <label>Admin Password</label>
                <div style="display: flex; gap: 1rem;">
                    <input type="password" id="adminPassword" required placeholder="Enter password">
                    <button type="submit" id="loadBtn">View Submissions</button>
                </div>
            </div>
            <div id="statusMessage" class="message"></div>
        </form>

        <div id="tableContainer" style="display: none; overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Message</th>
                    </tr>
                </thead>
                <tbody id="contactsTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('loadBtn');
            const statusDiv = document.getElementById('statusMessage');
            const tableContainer = document.getElementById('tableContainer');
            const tbody = document.getElementById('contactsTableBody');
            
            btn.disabled = true;
            btn.innerText = 'Loading...';
            statusDiv.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('password', password);

                const response = await fetch('/get_contacts.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    const contacts = result.contacts;
                    
                    if (contacts.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No submissions found.</td></tr>';
                    } else {
                        tbody.innerHTML = contacts.map(c => `
                            <tr>
                                <td style="white-space: nowrap;">${new Date(c.createdAt).toLocaleString()}</td>
                                <td>${c.firstName} ${c.lastName}</td>
                                <td><a href="mailto:${c.email}">${c.email}</a></td>
                                <td>${c.phone || '-'}</td>
                                <td class="message-content">${c.message}</td>
                            </tr>
                        `).join('');
                    }
                    
                    tableContainer.style.display = 'block';
                } else {
                    statusDiv.className = 'message error';
                    statusDiv.innerText = 'Error: ' + result.error;
                    statusDiv.style.display = 'block';
                    tableContainer.style.display = 'none';
                }
            } catch (error) {
                statusDiv.className = 'message error';
                statusDiv.innerText = 'An unexpected error occurred. Please check console.';
                statusDiv.style.display = 'block';
                console.error(error);
                tableContainer.style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.innerText = 'View Submissions';
            }
        });
    </script>
</body>
</html>
